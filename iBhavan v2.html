<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>iBhavan — Transforming Everyday Living</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    :root {
      --bg:#FDFBF7;
      --bg-alt:#F7F3EC;
      --surface:#FFFFFF;
      --text:#1A1612;
      --text-muted:#57504A;
      --text-dim:#948C82;
      --border:#E8E0D3;
      --border-soft:#F1EBDF;
      --accent:#D97436;      /* warm terracotta — reliable & grounded */
      --accent-dark:#B85E24;
      --accent-soft:#FBEEE2;
      --ink:#0A0A0A;
      --shadow:0 1px 2px rgba(0,0,0,0.04);
    }
    [data-theme="dark"]{
      --bg:#0F0C08;
      --bg-alt:#17130E;
      --surface:#141009;
      --text:#F5F1E8;
      --text-muted:#B8AE9F;
      --text-dim:#7A7065;
      --border:#2A241B;
      --border-soft:#1E1913;
      --accent:#EE9458;
      --accent-dark:#D97436;
      --accent-soft:rgba(238,148,88,0.13);
      --ink:#F5F4F0;
      --shadow:0 1px 2px rgba(0,0,0,0.3);
    }

    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;font-weight:400;line-height:1.55;font-feature-settings:'ss01','cv11';transition:background 0.3s,color 0.3s}

    .serif{font-family:'Instrument Serif',Georgia,serif;font-weight:400;letter-spacing:-0.015em;line-height:1.04}
    .italic{font-style:italic}

    h1,h2,h3,h4{font-family:'Instrument Serif',Georgia,serif;font-weight:400;letter-spacing:-0.015em;line-height:1.06}
    h1{font-size:clamp(3rem,7vw,6.2rem)}
    h2{font-size:clamp(2.2rem,4.5vw,3.8rem)}
    h3{font-size:clamp(1.4rem,2.4vw,1.9rem)}

    input,textarea,select,button{font-family:inherit}
    button{cursor:pointer;border:none;background:none}
    input:focus,textarea:focus,select:focus{outline:none;border-color:var(--ink)!important}
    ::-webkit-scrollbar{width:8px;height:8px}
    ::-webkit-scrollbar-track{background:var(--bg)}
    ::-webkit-scrollbar-thumb{background:var(--border)}

    /* Type helpers */
    .eyebrow{font-size:0.72rem;font-weight:500;letter-spacing:0.16em;text-transform:uppercase;color:var(--text-dim)}
    .eyebrow-dot::before{content:"";display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--accent);margin-right:10px;vertical-align:middle;transform:translateY(-1px)}
    .num{font-family:'Inter',sans-serif;font-variant-numeric:tabular-nums;font-size:0.76rem;font-weight:500;color:var(--text-dim);letter-spacing:0.04em}
    .lead{font-size:clamp(1.05rem,1.4vw,1.22rem);line-height:1.6;color:var(--text-muted);font-weight:300}

    /* Reveal */
    .reveal{opacity:0;transform:translateY(20px);transition:opacity 0.9s cubic-bezier(.16,1,.3,1),transform 0.9s cubic-bezier(.16,1,.3,1)}
    .reveal.in{opacity:1;transform:none}

    /* Page transition */
    .page-enter{animation:pageIn 0.5s cubic-bezier(.16,1,.3,1)}
    @keyframes pageIn{from{opacity:0}to{opacity:1}}

    /* Buttons */
    .btn{display:inline-flex;align-items:center;gap:0.65rem;padding:0.95rem 1.6rem;font-size:0.88rem;font-weight:500;border-radius:999px;transition:all 0.25s;letter-spacing:0.005em}
    .btn-dark{background:var(--ink);color:var(--bg)}
    .btn-dark:hover{background:var(--accent)}
    .btn-ghost{background:transparent;color:var(--text);border:1px solid var(--border)}
    .btn-ghost:hover{border-color:var(--ink);background:var(--ink);color:var(--bg)}
    .btn-link{font-weight:500;font-size:0.9rem;color:var(--ink);display:inline-flex;align-items:center;gap:0.45rem;padding:0;position:relative}
    .btn-link::after{content:"";position:absolute;left:0;right:0;bottom:-3px;height:1px;background:currentColor;transform-origin:right;transform:scaleX(1);transition:transform 0.4s cubic-bezier(.77,0,.175,1)}
    .btn-link:hover::after{transform-origin:left;transform:scaleX(0)}
    .arrow{display:inline-block;transition:transform 0.3s}
    .btn:hover .arrow,a:hover .arrow{transform:translateX(3px)}

    /* Nav */
    .nav{position:fixed;top:0;left:0;right:0;z-index:1000;background:color-mix(in srgb,var(--bg) 85%,transparent);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid transparent;transition:border-color 0.3s}
    .nav.scrolled{border-color:var(--border-soft)}
    .nav-inner{max-width:1440px;margin:0 auto;padding:0 2rem;height:72px;display:flex;align-items:center;justify-content:space-between;gap:2rem}
    .nav-logo{display:flex;align-items:center;gap:0.7rem;cursor:pointer}
    .nav-logo img{height:38px;width:38px;object-fit:cover;object-position:left center;border-radius:4px}
    .nav-logo .name{font-family:'Instrument Serif',serif;font-weight:400;font-size:1.55rem;color:var(--text);line-height:1;letter-spacing:-0.02em}
    .nav-links{display:flex;gap:0.15rem;align-items:center}
    .nav-item{position:relative;padding:0.6rem 1rem;font-size:0.88rem;font-weight:500;color:var(--text-muted);cursor:pointer;border-radius:6px;display:flex;align-items:center;gap:0.35rem;transition:color 0.2s}
    .nav-item:hover{color:var(--ink)}
    .nav-item.active{color:var(--ink)}
    .nav-item.active::after{content:"";position:absolute;left:50%;transform:translateX(-50%);bottom:-2px;width:4px;height:4px;border-radius:50%;background:var(--accent)}
    .nav-item .chev{font-size:0.6rem;opacity:0.5;transition:transform 0.3s}
    .nav-item.open .chev{transform:rotate(180deg)}

    /* Mega menu — editorial style */
    .mega{position:absolute;top:calc(100% + 12px);left:50%;transform:translateX(-50%) translateY(-6px);background:var(--bg);border:1px solid var(--border);min-width:780px;padding:2rem 2rem 1.5rem;display:grid;grid-template-columns:240px 1fr;gap:2rem;opacity:0;pointer-events:none;transition:opacity 0.3s,transform 0.3s;box-shadow:0 20px 60px rgba(10,10,10,0.08)}
    .mega.open{opacity:1;pointer-events:auto;transform:translateX(-50%) translateY(0)}
    .mega-sidebar{display:flex;flex-direction:column;gap:0.1rem;border-right:1px solid var(--border-soft);padding-right:1.5rem}
    .mega-title{font-size:0.66rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--text-dim);font-weight:600;margin-bottom:1rem}
    .mega-sidebar-item{padding:0.7rem 0;cursor:pointer;display:flex;align-items:baseline;gap:0.7rem;transition:color 0.2s;border-bottom:1px solid transparent}
    .mega-sidebar-item .ms-num{font-size:0.7rem;color:var(--text-dim);font-variant-numeric:tabular-nums}
    .mega-sidebar-item .ms-label{font-family:'Instrument Serif',serif;font-size:1.35rem;color:var(--text-muted);transition:color 0.2s;line-height:1.1}
    .mega-sidebar-item .ms-arrow{margin-left:auto;opacity:0;transition:opacity 0.2s,transform 0.2s;color:var(--accent)}
    .mega-sidebar-item:hover .ms-label,.mega-sidebar-item.active .ms-label{color:var(--ink)}
    .mega-sidebar-item.active .ms-arrow,.mega-sidebar-item:hover .ms-arrow{opacity:1;transform:translateX(3px)}
    .mega-panel{display:grid;grid-template-columns:1fr 1fr;gap:0 2rem}
    .mega-head{grid-column:1/-1;padding-bottom:1rem;border-bottom:1px solid var(--border-soft);margin-bottom:1rem;display:flex;justify-content:space-between;align-items:end}
    .mega-head .mh-t{font-family:'Instrument Serif',serif;font-size:1.55rem;color:var(--ink);line-height:1}
    .mega-head .mh-s{font-size:0.82rem;color:var(--text-muted);margin-top:4px}
    .mega-service{padding:0.85rem 0;cursor:pointer;border-bottom:1px solid var(--border-soft);display:flex;justify-content:space-between;align-items:center;transition:padding 0.25s}
    .mega-service:hover{padding-left:8px}
    .mega-service:hover .sv-title{color:var(--accent)}
    .mega-service .sv-title{font-size:0.92rem;font-weight:500;color:var(--text);transition:color 0.2s}
    .mega-service .sv-arrow{color:var(--text-dim);font-size:0.85rem;opacity:0;transition:opacity 0.2s,transform 0.2s}
    .mega-service:hover .sv-arrow{opacity:1;color:var(--accent);transform:translateX(3px)}

    /* Theme toggle */
    .theme-toggle{width:38px;height:38px;border-radius:50%;background:transparent;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--text);font-size:0.92rem;transition:all 0.25s}
    .theme-toggle:hover{border-color:var(--ink);background:var(--ink);color:var(--bg)}

    /* Hamburger */
    .hamburger{display:none;width:40px;height:40px;border-radius:50%;border:1px solid var(--border);color:var(--text);align-items:center;justify-content:center;background:transparent}

    /* Modal */
    .modal-backdrop{position:fixed;inset:0;background:rgba(10,10,10,0.35);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);z-index:2000;display:flex;align-items:center;justify-content:center;padding:1rem;opacity:0;pointer-events:none;transition:opacity 0.35s}
    .modal-backdrop.open{opacity:1;pointer-events:auto}
    .modal{background:var(--bg);width:100%;max-width:540px;max-height:92vh;overflow:auto;transform:translateY(20px);transition:transform 0.4s cubic-bezier(.16,1,.3,1);border:1px solid var(--border);box-shadow:0 20px 60px rgba(0,0,0,0.12)}
    .modal-backdrop.open .modal{transform:translateY(0)}
    .modal-header{padding:2rem 2rem 0;display:flex;justify-content:space-between;align-items:flex-start;gap:1rem}
    .modal-close{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:transparent;color:var(--text);font-size:0.9rem;transition:all 0.2s;flex-shrink:0}
    .modal-close:hover{background:var(--ink);color:var(--bg);border-color:var(--ink)}
    .modal-body{padding:1.25rem 2rem 2rem}

    /* Inputs */
    .inp{width:100%;padding:0.85rem 0;border:none;border-bottom:1px solid var(--border);background:transparent;color:var(--text);font-size:0.95rem;transition:border-color 0.2s}
    .inp:focus{border-color:var(--ink)}
    .inp::placeholder{color:var(--text-dim)}
    .inp-box{padding:0.85rem 1rem;border:1px solid var(--border);border-radius:0;background:transparent;color:var(--text);font-size:0.9rem;width:100%;transition:border-color 0.2s}
    .inp-box:focus{border-color:var(--ink)}
    .label{font-size:0.7rem;font-weight:500;color:var(--text-dim);display:block;margin-bottom:6px;letter-spacing:0.08em;text-transform:uppercase}

    /* Mobile */
    .mobile-menu{position:fixed;top:72px;left:0;right:0;bottom:0;background:var(--bg);padding:2rem;display:none;flex-direction:column;gap:0.25rem;z-index:999;overflow:auto}
    .mobile-menu.open{display:flex}
    .mobile-menu-item{padding:1rem 0;border-bottom:1px solid var(--border-soft);color:var(--text);font-family:'Instrument Serif',serif;font-size:1.8rem;line-height:1}
    .mobile-sub{padding-left:1rem;font-size:1.2rem;color:var(--text-muted);font-family:'Instrument Serif',serif}

    /* Cursor accent underline for serif headings */
    .accent-mark{color:var(--accent);font-style:italic}

    /* Hairline divider */
    .hairline{height:1px;background:var(--border-soft);width:100%}

    /* Float button */
    .float-contact{position:fixed;bottom:28px;right:28px;z-index:500;background:var(--ink);color:var(--bg);border:none;border-radius:999px;padding:0.95rem 1.5rem;font-weight:500;font-size:0.86rem;box-shadow:0 10px 30px rgba(0,0,0,0.15);display:flex;align-items:center;gap:0.55rem;transition:transform 0.25s,background 0.25s}
    .float-contact:hover{background:var(--accent);transform:translateY(-3px)}

    @media (max-width:1100px){.nav-item-hide{display:none}}
    @media (max-width:900px){
      .nav-links{display:none}
      .hamburger{display:flex}
      .mega{min-width:unset;width:calc(100vw - 2rem);grid-template-columns:1fr;left:auto;right:-1rem;transform:translateY(-6px)}
      .mega.open{transform:translateY(0)}
      .mega-sidebar{border-right:none;border-bottom:1px solid var(--border-soft);padding-right:0;padding-bottom:1rem}
      .mega-panel{grid-template-columns:1fr}
    }
    @media (max-width:680px){
      .float-contact{padding:0.8rem 1.2rem;font-size:0.82rem;bottom:20px;right:20px}
    }

    /* Subtle hover lift */
    .lift{transition:transform 0.4s cubic-bezier(.16,1,.3,1)}
    .lift:hover{transform:translateY(-3px)}

    /* image placeholder with subtle grain */
    .img-plate{position:relative;background:var(--bg-alt);overflow:hidden}
    .img-plate::after{content:"";position:absolute;inset:0;background-image:radial-gradient(var(--border) 0.5px,transparent 0.5px);background-size:4px 4px;opacity:0.4;pointer-events:none}

    /* Marquee */
    .marquee{overflow:hidden;position:relative}
    .marquee-track{display:flex;gap:4rem;width:max-content;animation:marq 40s linear infinite;align-items:center}
    @keyframes marq{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

    /* Stat */
    .stat-num{font-family:'Instrument Serif',serif;font-size:clamp(3rem,6vw,5rem);line-height:1;letter-spacing:-0.02em;color:var(--ink)}

    /* Link list */
    .link-list{list-style:none}
    .link-list li{padding:1rem 0;border-bottom:1px solid var(--border-soft);display:flex;justify-content:space-between;align-items:center;cursor:pointer;transition:padding 0.3s}
    .link-list li:hover{padding-left:10px}
    .link-list li:hover .ll-title{color:var(--accent)}
    .ll-title{font-family:'Instrument Serif',serif;font-size:1.5rem;color:var(--text);transition:color 0.2s;line-height:1.3;display:block}
    .ll-meta{font-size:0.82rem;color:var(--text-dim);display:flex;align-items:center;gap:0.5rem;flex-wrap:wrap;line-height:1.5}
    .ll-arrow{color:var(--text-dim);transition:transform 0.3s,color 0.2s}
    .link-list li:hover .ll-arrow{transform:translateX(5px);color:var(--accent)}

    /* Animated ambient hero background */
    .ambient-hero{position:absolute;inset:0;overflow:hidden;pointer-events:none;z-index:0}
    .ambient-hero::before{content:"";position:absolute;inset:-10%;background:
      radial-gradient(60% 50% at 20% 30%,rgba(216,56,98,0.18),transparent 60%),
      radial-gradient(50% 45% at 85% 20%,rgba(255,176,123,0.22),transparent 60%),
      radial-gradient(55% 60% at 70% 85%,rgba(120,80,220,0.14),transparent 65%),
      radial-gradient(45% 40% at 15% 90%,rgba(80,160,220,0.14),transparent 65%);
      filter:blur(40px);
      animation:ambientDrift 22s ease-in-out infinite alternate;
    }
    [data-theme="dark"] .ambient-hero::before{background:
      radial-gradient(60% 50% at 20% 30%,rgba(240,88,133,0.28),transparent 60%),
      radial-gradient(50% 45% at 85% 20%,rgba(255,160,100,0.22),transparent 60%),
      radial-gradient(55% 60% at 70% 85%,rgba(140,100,255,0.22),transparent 65%),
      radial-gradient(45% 40% at 15% 90%,rgba(90,180,240,0.18),transparent 65%);
      filter:blur(50px)
    }
    .ambient-hero::after{content:"";position:absolute;inset:0;background-image:
      radial-gradient(circle at 1px 1px,var(--border) 1px,transparent 0);
      background-size:28px 28px;opacity:0.4;mask-image:radial-gradient(ellipse 80% 70% at 50% 40%,#000 20%,transparent 85%);
      -webkit-mask-image:radial-gradient(ellipse 80% 70% at 50% 40%,#000 20%,transparent 85%)
    }
    @keyframes ambientDrift{
      0%{transform:translate(0,0) scale(1) rotate(0deg)}
      33%{transform:translate(3%,-2%) scale(1.08) rotate(3deg)}
      66%{transform:translate(-2%,3%) scale(0.95) rotate(-2deg)}
      100%{transform:translate(2%,2%) scale(1.05) rotate(1deg)}
    }

    /* Floating orbs (SVG wrappers) */
    .orb{position:absolute;border-radius:50%;filter:blur(30px);opacity:0.6;animation:orbFloat 18s ease-in-out infinite alternate}
    .orb-1{width:420px;height:420px;background:radial-gradient(circle,var(--accent),transparent 70%);top:-5%;left:-8%;animation-duration:24s}
    .orb-2{width:360px;height:360px;background:radial-gradient(circle,#8B5CF6,transparent 70%);top:40%;right:-6%;animation-duration:28s;animation-delay:-6s;opacity:0.35}
    .orb-3{width:300px;height:300px;background:radial-gradient(circle,#F59E0B,transparent 70%);bottom:-10%;left:35%;animation-duration:32s;animation-delay:-12s;opacity:0.35}
    @keyframes orbFloat{
      0%{transform:translate(0,0) scale(1)}
      50%{transform:translate(40px,-30px) scale(1.12)}
      100%{transform:translate(-30px,20px) scale(0.92)}
    }
    @media (prefers-reduced-motion:reduce){.ambient-hero::before,.orb{animation:none !important}}

    /* Photo card with overlay */
    .photo-card{position:relative;overflow:hidden;background:var(--bg-alt);border-radius:0}
    .photo-card img{width:100%;height:100%;object-fit:cover;display:block;transition:transform 1.2s cubic-bezier(.16,1,.3,1);filter:brightness(0.92) contrast(1.02)}
    [data-theme="dark"] .photo-card img{filter:brightness(0.78) contrast(1.05)}
    .photo-card:hover img{transform:scale(1.04)}
    .photo-card .photo-caption{position:absolute;inset:auto 0 0 0;padding:1rem 1.25rem;background:linear-gradient(to top,rgba(0,0,0,0.7),transparent);color:#fff;font-size:0.78rem;letter-spacing:0.08em;text-transform:uppercase;font-weight:500}
    .photo-card .photo-num{position:absolute;top:1rem;left:1.25rem;color:#fff;font-size:0.7rem;letter-spacing:0.16em;font-weight:600;text-shadow:0 1px 3px rgba(0,0,0,0.4)}

    /* Mosaic grid */
    .mosaic{display:grid;grid-template-columns:repeat(12,1fr);grid-auto-rows:140px;gap:1rem}
    .mosaic > *{overflow:hidden}
    @media (max-width:900px){.mosaic{grid-auto-rows:120px;gap:0.6rem}}

    /* CTA image backdrop */
    .cta-photo-bg{position:relative;overflow:hidden;color:#F5F4F0}
    .cta-photo-bg::before{content:"";position:absolute;inset:0;background:linear-gradient(135deg,rgba(10,10,10,0.78),rgba(10,10,10,0.55))}
    .cta-photo-bg img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:-1}

    /* Service hero banner */
    .service-hero{position:relative;min-height:60vh;display:flex;align-items:flex-end;overflow:hidden;padding-top:8rem}
    .service-hero > img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0}
    .service-hero-overlay{position:absolute;inset:0;background:linear-gradient(180deg,rgba(10,8,5,0.45) 0%,rgba(10,8,5,0.25) 40%,rgba(10,8,5,0.85) 100%);z-index:1}
    .service-hero-inner{position:relative;z-index:2;max-width:1320px;margin:0 auto;padding:0 2rem 4rem;width:100%}
    .service-hero-inner h1{color:#fff}

    /* Product card */
    .product-card{background:var(--surface);border:1px solid var(--border-soft);cursor:pointer;display:flex;flex-direction:column;height:100%;transition:border-color 0.3s,transform 0.4s cubic-bezier(.16,1,.3,1)}
    .product-card:hover{border-color:var(--ink);transform:translateY(-4px)}
    .product-img{position:relative;aspect-ratio:1/1;overflow:hidden;background:var(--bg-alt)}
    .product-img img{width:100%;height:100%;object-fit:cover;display:block;transition:transform 0.8s cubic-bezier(.16,1,.3,1)}
    .product-card:hover .product-img img{transform:scale(1.05)}
    .product-body{padding:1.5rem;display:flex;flex-direction:column;flex:1}
    .product-cat{font-size:0.7rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-dim);font-weight:500;margin-bottom:0.6rem}

    /* Pillar / value icon ring */
    .pillar-icon{width:56px;height:56px;border-radius:50%;background:var(--accent-soft);color:var(--accent);display:inline-flex;align-items:center;justify-content:center;font-size:1.2rem;margin-bottom:1.5rem}
  </style>
</head>
<body>
  <div id="root"></div>

<script type="text/babel" src="components/IBhavanData.jsx"></script>
<script type="text/babel" src="components/IBhavanShared.jsx"></script>
<script type="text/babel" src="components/IBhavanNav2.jsx"></script>
<script type="text/babel" src="components/IBhavanHome2.jsx"></script>
<script type="text/babel" src="components/IBhavanServicePages.jsx"></script>
<script type="text/babel" src="components/IBhavanOtherPages.jsx"></script>
<script type="text/babel" src="components/IBhavanFooter.jsx"></script>
<script type="text/babel" src="components/IBhavanApp.jsx"></script>
</body>
</html>
